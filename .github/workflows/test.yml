name: Veda Learn API Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: veda-learn-api

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Recommend node version for veda-learn-api
          cache: 'npm'
          cache-dependency-path: 'veda-learn-api/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
